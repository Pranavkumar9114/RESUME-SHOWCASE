allprojects {
    repositories {
        google()
        mavenCentral()
        jcenter()  // You might want to remove this as JCenter is deprecated
        maven { url 'https://sdk.squareup.com/public/android' }  // Add Square's Maven repository
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
